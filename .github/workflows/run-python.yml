name: Flask Math Server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors

      - name: Start Flask server
        run: |
          python main.py &
          sleep 3
          echo "✅ Flask is up"

      - name: Generate throwaway SSH key
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          echo "✅ SSH key generated"

      - name: Expose via localhost.run, save and push URL
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/id_ed25519 \
              -R 80:localhost:5000 \
              localhost.run 2>&1 | tee tunnel.log &

          sleep 10

          PUBLIC_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.lhr\.life' tunnel.log | head -1)

          echo ""
          echo "================================================"
          echo "  🚀 SERVER URL: $PUBLIC_URL"
          echo "================================================"

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ ERROR: Could not extract URL"
            cat tunnel.log
            exit 1
          fi

          # Delete old file if exists, write fresh one
          rm -f server_url.txt
          echo "$PUBLIC_URL" > server_url.txt
          echo "✅ Saved: $(cat server_url.txt)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server_url.txt
          git commit -m "chore: update server_url.txt [skip ci]"
          git push

          echo "✅ server_url.txt pushed to repo"

          sleep 7200
